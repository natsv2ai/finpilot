version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finpilot
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot123 # ALWAYS change this in production!
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot -d finpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
